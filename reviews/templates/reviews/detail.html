{% extends 'dogs/base.html' %}
{% load my_tags %}
{% block content %}
<div class="row">
    <div class="col-md-6">
        <div class="card mb-6 box-shadow">
            <div class="card-header">
                <p class="card-text">
                    Отзыв: {{ object.dog }}
                </p>
            </div>
            <img class="card-img-top"
                    src="{{ object.dog.photo|dogs_media }}" width="300" height="320"
                    alt="Card image cap">
            <div class="card-body">
                <p class="card-text">
                    {{ object.content }}
                </p>
                <span class="text-muted">Дата создания: {{ object.created }}</span><br>
                <span class="text-muted">Автор: {{ object.author|default:'Удаленный пользователь' }}</span><br>
            </div>
            <div class="card-body">
                <a href="{% url 'reviews:reviews_list' %}" class="btn btn-outline-primary"><< Назад</a>
            </div>
        </div>
    </div>
</div>


{% endblock %}
